version: '3.1'

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge

responses:
  utter_greet:
    - text: 'Hey! How are you?'

  utter_cheer_up:
    - text: 'Here is something to cheer you up:'
      image: 'https://i.imgur.com/nGF1K8f.jpg'

  utter_did_that_help:
    - text: 'Did that help you?'

  utter_happy:
    - text: 'Great, carry on!'

  utter_goodbye:
    - text: 'Bye'

  utter_iamabot:
    - text: 'I am a bot, powered by Rasa.'

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

forms:
  pain_assessment_form:
    required_slots:
      - pain_level
      - pain_location
      - pain_duration

slots:
  pain_level:
    type: text
    mappings:
      - type: from_entity
        entity: pain_level

  pain_location:
    type: text
    mappings:
      - type: from_entity
        entity: pain_location

  pain_duration:
    type: text
    mappings:
      - type: from_entity
        entity: pain_duration
